name: Build and Push ComfyUI-VastAI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 手動でビルドを回したい時用

env:
  REGISTRY: ghcr.io
  # リポジトリ名 (zgock999/comfyui-vastai 等) を自動取得
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: self-hosted # 稼働中のセルフホストランナーを使用
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # 5090 (Blackwell) 対応のビルド
      # セルフホストランナー上の Docker キャッシュを利用して高速化
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # セルフホストランナー側のディスク容量に余裕がある場合、
          # インラインキャッシュを使うと 2回目以降のビルドが劇的に早くなります
          #cache-from: type=gha
          #cache-to: type=gha,mode=max
