name: Build and Push ComfyUI-VastAI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 手動実行用ボタンをActionsタブに表示

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. ランナー内の古いビルドキャッシュを物理的に削除（ゴースト対策）
      - name: Prune Docker builder cache
        run: docker builder prune -f

      # 2. GitHub Container Registry へのログイン
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. タグ（latest と short-sha）の生成
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # 4. ビルドおよびプッシュ（no-cache を有効化）
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # キャッシュを一切使わず、すべてのレイヤーを最初からビルドする
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # cache-from / cache-to は意図的に除外してキャッシュ汚染を防止
